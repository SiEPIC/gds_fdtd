name: lower-bounds

# WP7.1.6: weekly resolution at the LOWEST declared dependency floors —
# catches "works only on the latest deps" rot that the locked matrix
# cannot see. Manual dispatch for pre-release checks.

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lowest-direct:
    name: test (py3.11, lowest-direct floors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0 # hatch-vcs needs tags
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - name: Install at dependency floors
        run: |
          uv venv
          uv pip install --resolution lowest-direct -e ".[dev]"
      - name: Run tests
        run: uv run --no-sync pytest -m "not physics and not gpu and not cloud and not licensed" tests
