name: lumerical-nightly

# WP7.5.2: real-Lumerical lane on a self-hosted runner (lab machine holding
# the license). MERGED IN SKIPPED STATE: it only runs when the repo variable
# LUMERICAL_RUNNER is set to "true" (Settings -> Variables), which the owner
# does after registering a runner per docs/self_hosted_runner.md.

on:
  schedule:
    - cron: "41 7 * * *" # nightly 07:41 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  licensed-smoke:
    if: vars.LUMERICAL_RUNNER == 'true'
    runs-on: [self-hosted, lumerical]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Run the licensed suite
        run: |
          uv sync --locked --extra dev
          uv run pytest -m licensed tests -q
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: lumerical-nightly-artifacts
          path: |
            **/*.dat
            **/*.log
          retention-days: 14
