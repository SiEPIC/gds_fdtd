name: cflite-pr

# ClusterFuzzLite: short fuzzing run on PRs that touch the library or the
# fuzz targets, catching parser crashes before they merge.

on:
  pull_request:
    paths:
      - "src/gds_fdtd/**"
      - "fuzz/**"
      - ".clusterfuzzlite/**"

permissions: read-all

concurrency:
  group: cflite-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
          sanitizer: address
      - name: Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 180
          mode: "code-change"
          sanitizer: address
          output-sarif: true
