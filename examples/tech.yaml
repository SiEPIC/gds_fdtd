# ONE technology file for EVERY solver — schema v2: materials are defined
# ONCE by name and referenced by layers (owner directive, 2026-07-08).
#
# A material may carry up to THREE sources of optical constants; each engine
# picks one at run time (see docs/technology.rst -> "Material sources"):
#   tidy3d    - tidy3d's own database model  \  the "eda" source: the engine's
#   lumerical - the Lumerical database name   /  own dispersive vendor model.
#   rii       - a refractiveindex.info page (shelf/book/page): engine-independent,
#               dispersive, read offline from a local DB copy (GDS_FDTD_RII_DB).
#   nk        - a single neutral constant index.
#
# Selection per material, per engine:
#   * explicit `source: eda|rii|nk` wins (error if that source isn't defined), else
#   * default precedence  eda -> rii -> nk  (first one defined wins), else
#   * a clear error (e.g. a lumerical-only material run on tidy3d).
# beamz has no vendor DB, so it uses rii or nk. You need not specify all three.
#
# The substrate below demonstrates the pinning: it carries all three sources
# and forces `source: rii`, so EVERY engine models the buried oxide from the
# same refractiveindex.info page (tidy3d fits a dispersive medium to it;
# Lumerical and beamz sample it at the band). Engines that build the substrate
# need the DB on disk - point GDS_FDTD_RII_DB at a database copy, e.g. the
# mini-DB shipped with these examples (examples/02_technology/rii_db).
# 02b_rii_to_engines walks through exactly this material.
#
# Pick the engine at run time - the technology never changes:
#   solver = get_solver("tidy3d" | "lumerical" | "beamz")(component, tech, spec)
#
# Migrate old per-layer-material files with: gds-fdtd convert-tech old.yaml

technology:
  name: "EBeam"
  schema_version: 2

  materials:
    Si:
      nk: 3.476
      tidy3d: [cSi, Li1993_293K]
      lumerical: Si (Silicon) - Palik
    SiN:
      nk: 1.997
      tidy3d: [Si3N4, Luke2015PMLStable]
      lumerical: Si3N4 (Silicon Nitride) - Luke
    SiO2:
      nk: 1.444
      tidy3d: 1.444
      lumerical: SiO2 (Glass) - Palik
    SiO2_rii:            # fused silica pinned to the Malitson (1965) Sellmeier
      nk: 1.444          # model: `source: rii` overrides the eda->rii->nk
      tidy3d: 1.444      # precedence, so all three engines use the SAME
      lumerical: SiO2 (Glass) - Palik   # dispersive rii page (needs GDS_FDTD_RII_DB)
      rii: {shelf: main, book: SiO2, page: Malitson}
      source: rii

  substrate: {z_base: 0.0, z_span: -2, material: SiO2_rii}
  superstrate: {z_base: 0.0, z_span: 3, material: SiO2}

  pinrec:
    - layer: [1, 10]
  devrec:
    - layer: [68, 0]

  device:
    - {layer: [1, 0], z_base: 0.0, z_span: 0.22, material: Si, sidewall_angle: 85}
    - {layer: [4, 0], z_base: 0.3, z_span: 0.4, material: SiN, sidewall_angle: 83}
